<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>ReplyMaven — The support platform for teams who see support as a growth channel</title>
    <meta
      name="description"
      content="Your first CS hire: an AI agent trained on your docs, FAQs, and SOPs that answers, triages, and takes real actions — plus a delightful inbox you can clear in ten minutes."
    />
    <script>
      // Apply the stored theme before first paint so the app never flashes
      // dark on load. Must mirror getStoredTheme() in src/lib/theme.ts
      // (same storage key, same "dark" default).
      (function () {
        var theme = "dark";
        try {
          var stored = localStorage.getItem("rm-theme");
          if (stored === "light" || stored === "dark") theme = stored;
        } catch (e) {
          /* localStorage unavailable */
        }
        document.documentElement.classList.add(theme);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script
      src="https://widget.replymaven.com/widget-embed.js"
      data-project="replymaven"
    ></script>
  </body>
</html>
